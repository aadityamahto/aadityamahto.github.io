<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub GOD MODE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif}

body{
  background:#020617;
  color:white;
  overflow-x:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

header{
  text-align:center;
  padding:25px;
  font-size:36px;
  background:linear-gradient(90deg,#22c55e,#6366f1);
  text-shadow:0 0 30px #22c55e;
}

.container{padding:20px}

.search-box{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-bottom:20px;
  font-size:16px;
  background:#0f172a;
  color:white;
}

.categories{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.category-btn{
  padding:10px 16px;
  border:none;
  border-radius:25px;
  background:#0f172a;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.category-btn:hover, .active{
  background:#22c55e;
  box-shadow:0 0 15px #22c55e;
}

.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card{
  background:rgba(15,23,42,0.6);
  border-radius:20px;
  padding:18px;
  backdrop-filter: blur(15px);
  transition:0.4s;
  position:relative;
  will-change: transform;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 40px #22c55e55;
}

.buttons a{
  display:inline-block;
  margin-top:10px;
  margin-right:6px;
  padding:9px 14px;
  border-radius:8px;
  text-decoration:none;
  color:white;
}

.site{background:#3b82f6}
.download{background:#22c55e}

footer{
  text-align:center;
  padding:20px;
  margin-top:30px;
  color:#94a3b8;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>👑 GameHub GOD MODE</header>

<div class="container">

<input type="text" id="search" class="search-box" placeholder="Search games...">

<div class="categories">
  <button class="category-btn active" onclick="filter('all', event)">All</button>
  <button class="category-btn" onclick="filter('game', event)">Games</button>
  <button class="category-btn" onclick="filter('tool', event)">Tools</button>
</div>

<div class="games" id="gameList"></div>

</div>

<footer>⚡ Ultimate Gaming Experience</footer>

<script>
// GAME DATA (dynamic rendering)
const games=[
{name:"Roblox",type:"game",desc:"Play millions of games.",img:"https://tr.rbxcdn.com/180DAY-0a7f1e8e8d0c5cfd8f7f3c9c1e4f2f1d/768/432/Image/Webp/noFilter",site:"https://roblox.com",download:"https://roblox.com/download"},
{name:"Wurst Client",type:"tool",desc:"Advanced Minecraft hacked client.",img:"https://www.wurstclient.net/img/wurstlogo.png",site:"https://www.wurstclient.net",download:"https://www.wurstclient.net/download/"},
{name:"Fabric API",type:"tool",desc:"Lightweight modding toolchain.",img:"https://fabricmc.net/assets/logo.png",site:"https://fabricmc.net",download:"https://fabricmc.net/use/installer/"},
{name:"Discord",type:"tool",desc:"Chat platform.",img:"https://cdn.discordapp.com/attachments/850000000000000000/discord-logo.png",site:"https://discord.com",download:"https://discord.com/download"},
{name:"Custom Cursor",type:"tool",desc:"Cursor customization.",img:"https://custom-cursor.com/favicon.ico",site:"https://custom-cursor.com",download:"https://custom-cursor.com/download"},
{name:"Minecraft",type:"game",desc:"Build and survive.",site:"https://minecraft.net",download:"https://minecraft.net/download"},
,
{name:"Fabric API",type:"tool",desc:"Lightweight modding toolchain for Minecraft.",site:"https://fabricmc.net",download:"https://fabricmc.net/use/installer/"}
];

const container=document.getElementById("gameList");
function render(){
 container.innerHTML="";
 games.forEach(g=>{
  const card=document.createElement("div");
  card.className="card";
  card.dataset.type=g.type;
  card.innerHTML=`<img src="${g.img}" style="width:100%;border-radius:12px;margin-bottom:10px;height:150px;object-fit:cover;"><h3>${g.name}</h3><p>${g.desc}</p><div class="buttons"><a href="${g.site}" target="_blank" class="site">Website</a><a href="${g.download}" target="_blank" class="download">Download</a></div>`;
  container.appendChild(card);
 });
}
render();

// FILTER + SEARCH
let current="all";
const search=document.getElementById("search");
search.addEventListener("input",apply);

function filter(type,e){
 current=type;
 document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
 if(e)e.target.classList.add("active");
 apply();
}

function apply(){
 const val=search.value.toLowerCase();
 document.querySelectorAll(".card").forEach(c=>{
  const ok=(current==='all'||c.dataset.type===current)&&c.innerText.toLowerCase().includes(val);
  c.style.display=ok?"block":"none";
 });
}

// 🔥 3D PARTICLE BACKGROUND (REALISTIC)
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
 particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,z:Math.random()*2});
}

function animate(){
 ctx.fillStyle="#020617";
 ctx.fillRect(0,0,canvas.width,canvas.height);
 ctx.fillStyle="#22c55e";
 particles.forEach(p=>{
  p.y+=p.z;
  if(p.y>canvas.height) p.y=0;
  ctx.beginPath();
  ctx.arc(p.x,p.y,p.z*2,0,Math.PI*2);
  ctx.fill();
 });
 requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize',()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
});
</script>

</body>
</html>
